 <h2 class=&quot;sec&quot;>개요 · 목적</h2>
 <p class=&quot;lead&quot;>10-K Item 5(Issuer Purchases of Equity Securities) 추출 데이터를 <code>index.html</code> 모듈로 추가한다. 이 화면은 <strong>&quot;이 회사가 자사주를 사는가/안 사는가, 얼마짜리 프로그램으로 얼마나 사고, 얼마나 남았나&quot;</strong>를 사실로 보여준다. 자사주 매입은 <em>주주에게 자본을 돌려주는</em> 방식 — 인수(성장 재투자)·부채(자금 조달)와 함께 자본 배분 그림이 된다.</p>

 <h3 class=&quot;sub&quot;>투자자가 읽을 사실 (중립·균등)</h3>
 <div class=&quot;grid2&quot;>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>매입 규모·시점</div><div class=&quot;v&quot;>이사회가 승인한 <strong>프로그램 금액·시점</strong>(각 건 원문 그대로).</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>잔여 한도</div><div class=&quot;v&quot;>앞으로 매입에 쓸 수 있는 <strong>승인 잔액</strong>(<code>value_remaining</code>).</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>분기 매입</div><div class=&quot;v&quot;>공시 분기의 <strong>총 매입 수량</strong>.</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>타이밍 — 가격·수량</div><div class=&quot;v&quot;>월별 <strong>평균단가와 매입수량을 나란히</strong> — 판단은 투자자에게.</div></div>
 </div>

 <h3 class=&quot;sub&quot;>설계 원칙 <span class=&quot;tag none&quot;>인수·부채·부동산 모듈과 동일</span></h3>
 <p>결론(좋다/나쁘다·영리하다)을 단정하지 않고 사실만 나열. 자사주를 <strong>안 사는 것도 중립 사실</strong>(재투자일 수 있음). 금액·수량은 <strong>원문 통화·단위·스케일 그대로</strong>, 회사 단위 누적 합산·연환산·역산은 하지 않는다. kr 기준(설명 한국어, 금액·단가는 원문). 카드/표엔 <strong>출처만</strong>(원문 인용 제외).</p>

 <h3 class=&quot;sub&quot;>대상 데이터</h3>
 <p>10개 종목 × 연도별 10-K, 총 <strong>36건</strong> (2022~2026). 공시 분포: <strong>매입 공시 23 · 명시적 없음 11 · 미공시 2</strong>. 꾸준히 매입(AAPL·GOOGL·MSFT·NVDA·LLY) / 중단(META·BRK-B·AVGO) / 안 함(AMZN·TSLA)으로 갈림 — 같은 틀이 셋 모두에서 거짓 없이 작동해야 한다.</p>
</section>

es of Equity Securities by the Issuer and Affiliated Purchasers&quot;], &quot;ds&quot;: &quot;explicitly_none&quot;, &quot;dsq&quot;: &quot;**Purchases of Equity Securities by the Issuer and Affiliated Purchasers**\nNone.&quot;, &quot;progs&quot;: [], &quot;rows&quot;: []}, {&quot;tk&quot;: &quot;TSLA&quot;, &quot;fy&quot;: &quot;2024-12-31&quot;, &quot;acc&quot;: &quot;0001628280-25-003063&quot;, &quot;fd&quot;: &quot;2025-01-30&quot;, &quot;sh&quot;: [&quot;ITEM 5. MARKET FOR REGISTRANT'S COMMON EQUITY, RELATED STOCKHOLDER MATTERS AND ISSUER PURCHASES OF EQUITY SECURITIES&quot;, &quot;Purchases of Equity Securities by the Issuer and Affiliated Purchasers&quot;], &quot;ds&quot;: &quot;explicitly_none&quot;, &quot;dsq&quot;: &quot;**Purchases of Equity Securities by the Issuer and Affiliated Purchasers**\nNone.&quot;, &quot;progs&quot;: [], &quot;rows&quot;: []}, {&quot;tk&quot;: &quot;TSLA&quot;, &quot;fy&quot;: &quot;2025-12-31&quot;, &quot;acc&quot;: &quot;0001628280-26-003952&quot;, &quot;fd&quot;: &quot;2026-01-29&quot;, &quot;sh&quot;: [&quot;Item 5. Market for Registrant's Common Equity, Related Stockholder Matters and Issuer Purchases of Equity Securities&quot;], &quot;ds&quot;: &quot;not_disclosed&quot;, &quot;dsq&quot;: null, &quot;progs&quot;: [], &quot;rows&quot;: []}];
const CO={AAPL:'Apple',AMZN:'Amazon',AVGO:'Broadcom','BRK-B':'Berkshire Hathaway',GOOGL:'Alphabet',LLY:'Eli Lilly',META:'Meta',MSFT:'Microsoft',NVDA:'NVIDIA',TSLA:'Tesla'};

const DSTAT={disclosed:{lab:'매입 공시',c:'blue'},explicitly_none:{lab:'없음 명시',c:'gray'},not_disclosed:{lab:'언급 없음',c:'gray'}};

function badge(c,t){const r=BADGE[c]||BADGE.gray;return `<span class=&quot;badge&quot; style=&quot;background:${r.bg};color:${r.fg}&quot;>${t}</span>`;}
function fy(f){return 'FY'+f.fy.slice(0,4);}
function shares(o){if(!o||o[0]==null)return '—';const s=o[2]?` <span class=&quot;scl&quot;>${SCL[o[2]]||o[2]}주</span>`:' <span class=&quot;scl&quot;>주</span>';return o[0].toLocaleString()+s;}
function usd(o){if(!o||o[0]==null)return '—';const s=o[2]?` <span class=&quot;scl&quot;>${SCL[o[2]]||o[2]} USD</span>`:'';return '$'+o[0].toLocaleString()+s;}
function progAmt(p){if(p.av==null)return '금액 미공시';const sym=p.au==='EUR'?'€':'$';let suf=p.as==='billions'?'B':p.as==='millions'?'M':p.as==='thousands'?'K':'';return sym+p.av+suf;}
function totalRow(rec){return (rec.rows||[]).find(r=>r.lab==='합계'||/total/i.test(r.lab||''))||null;}
function monthRows(rec){return (rec.rows||[]).filter(r=>!(r.lab==='합계'||/total/i.test(r.lab||'')));}
function latest(tk){return SR.filter(r=>r.tk===tk).sort((a,b)=>b.fy.localeCompare(a.fy))[0];}
function shortPeriod(lab){lab=lab||'';let km=lab.match(/(\d{1,2})월\s*(\d{1,2})일/);if(km)return km[1]+'/'+km[2];let em=lab.match(/([A-Za-z]+)\s+(\d{1,2})/);if(em)return em[1].slice(0,3)+' '+em[2];return lab.slice(0,7);}
function fmtDate(iso){if(!iso)return '—';return String(iso).split('-').map(x=>parseInt(x,10)).join('.');}
function fmtMonth(iso){if(!iso)return '';const p=String(iso).split('-');return parseInt(p[0],10)+(p[1]?'.'+parseInt(p[1],10):'');}
function isTot(lab){return lab==='합계'||/total/i.test(lab||'');}
function periodCell(r){if(isTot(r.lab))return '합계';if(r.s){let o=fmtDate(r.s);if(r.e){const e=String(r.e).split('-');o+=' ~ '+parseInt(e[1],10)+'.'+parseInt(e[2],10);}return o;}return r.lab||'—';}
function chartLabel(m){if(m.s){const p=String(m.s).split('-');return parseInt(p[1],10)+'.'+parseInt(p[2],10);}return shortPeriod(m.lab);}

function pastSR(rec){const o=SR.filter(x=>x.tk===rec.tk&amp;&amp;x.fy!==rec.fy);return o.some(x=>x.ds==='disclosed')?' · 과거 연도 자료 있음':'';}
function listSignal(rec){
 if(rec.ds==='not_disclosed')return '언급 없음'+pastSR(rec);
 if(rec.ds==='explicitly_none')return '자사주 매입 없음'+pastSR(rec);
 const prog=(rec.progs||[]).filter(p=>p.av!=null).slice(-1)[0];
 const tr=totalRow(rec);
 const pieces=[];
 if(prog)pieces.push('프로그램 '+progAmt(prog));
 if(tr&amp;&amp;tr.rem&amp;&amp;tr.rem[0]!=null)pieces.push('잔여 '+usd(tr.rem));
 if(!pieces.length&amp;&amp;tr&amp;&amp;tr.tot&amp;&amp;tr.tot[0]!=null)pieces.push('공시분기 '+tr.tot[0].toLocaleString()+(tr.tot[2]?(SCL[tr.tot[2]]||''):'')+'주');
 return pieces.join(' · ')||'매입 표 공시';
}
function renderList(){
 const el=document.getElementById('sr-list');
 el.innerHTML=ORDER.map(tk=>{const rec=latest(tk);const ds=DSTAT[rec.ds]||DSTAT.not_disclosed;
  return `<div class=&quot;sr-row ${tk===SEL?'on':''}&quot; data-tk=&quot;${tk}&quot;><div class=&quot;tk&quot;>${tk}</div><div class=&quot;co&quot;>${CO[tk]||''}</div>${badge(ds.c,ds.lab)}<div class=&quot;sig&quot;>${listSignal(rec)} <span class=&quot;scl&quot;>· ${fy(rec)}</span></div></div>`;
 }).join('');
 el.querySelectorAll('.sr-row').forEach(r=>r.onclick=()=>{SEL=r.dataset.tk;delete YSEL[SEL];renderList();renderDetail();});
}

function facts(rec){
 const tr=totalRow(rec);
 const progs=(rec.progs||[]).filter(p=>p.av!=null);
 const cProg=progs.length?`<div style=&quot;margin-top:5px&quot;>${progs.map(p=>`<span class=&quot;pchip&quot;>${progAmt(p)}${p.ad?' · '+fmtMonth(p.ad):''}</span>`).join('')}</div>`:`<div class=&quot;na&quot;>미공시</div>`;
 const cRem=tr&amp;&amp;tr.rem&amp;&amp;tr.rem[0]!=null?`<div class=&quot;val&quot;>${usd(tr.rem)}</div>`:`<div class=&quot;na&quot;>미공시</div>`;
 const cTot=tr&amp;&amp;tr.tot&amp;&amp;tr.tot[0]!=null?`<div class=&quot;val&quot;>${shares(tr.tot)}</div>`:`<div class=&quot;na&quot;>—</div>`;
 return `<div class=&quot;facts&quot;>
  <div class=&quot;cell&quot;><div class=&quot;lab&quot;>매입 규모·시점</div>${cProg}<div class=&quot;sub&quot;>이사회 승인 (합산 안 함)</div></div>
  <div class=&quot;cell&quot;><div class=&quot;lab&quot;>남은 매입 한도</div>${cRem}<div class=&quot;sub&quot;>앞으로 매입 가능한 승인 잔액</div></div>
  <div class=&quot;cell&quot;><div class=&quot;lab&quot;>이번 분기 매입 수량</div>${cTot}<div class=&quot;sub&quot;>공시 분기 합계 주식 수</div></div>
 </div>`;
}

function comboChart(rec){
 const ms=monthRows(rec);
 const qs=ms.map(m=>m.tot&amp;&amp;m.tot[0]!=null?m.tot[0]:null);
 if(!ms.length||qs.every(q=>q==null))return '';
 const ps=ms.map(m=>m.avg&amp;&amp;m.avg[0]!=null?m.avg[0]:null);
 const hasP=ps.some(p=>p!=null);
 const n=ms.length;const W=Math.min(560,Math.max(260,120*n+40)),H=170,padT=22,padB=42;
 const plotH=H-padT-padB,slot=W/n,barW=Math.min(46,slot*0.46);
 const maxQ=Math.max(...qs.filter(q=>q!=null));
 const pv=ps.filter(p=>p!=null);const pmin=Math.min(...pv),pmax=Math.max(...pv),pr=(pmax-pmin)||1;
 const py=p=>padT+(1-(p-pmin)/pr)*(plotH*0.55);
 const sclSuf=(ms[0].tot&amp;&amp;ms[0].tot[2])?(SCL[ms[0].tot[2]]||''):'';
 let s=`<svg viewBox=&quot;0 0 ${W} ${H}&quot; width=&quot;100%&quot; style=&quot;max-width:${W}px;display:block&quot;>`;
 s+=`<line x1=&quot;0&quot; y1=&quot;${padT+plotH}&quot; x2=&quot;${W}&quot; y2=&quot;${padT+plotH}&quot; stroke=&quot;#d8d6ce&quot;/>`;
 ms.forEach((m,i)=>{const cx=slot*i+slot/2;const q=qs[i];
  if(q!=null){const h=Math.max(2,q/maxQ*plotH);
   s+=`<rect x=&quot;${(cx-barW/2).toFixed(1)}&quot; y=&quot;${(padT+plotH-h).toFixed(1)}&quot; width=&quot;${barW.toFixed(1)}&quot; height=&quot;${h.toFixed(1)}&quot; rx=&quot;3&quot; fill=&quot;#9DBBDD&quot;/>`;
   s+=`<text x=&quot;${cx.toFixed(1)}&quot; y=&quot;${(padT+plotH-h-4).toFixed(1)}&quot; text-anchor=&quot;middle&quot; font-size=&quot;10&quot; fill=&quot;#5F5E5A&quot;>${q.toLocaleString()}${sclSuf}</text>`;}
  s+=`<text x=&quot;${cx.toFixed(1)}&quot; y=&quot;${H-24}&quot; text-anchor=&quot;middle&quot; font-size=&quot;10&quot; fill=&quot;#8a8980&quot;>${chartLabel(m)}</text>`;
 });
 if(hasP){let pts=[];ms.forEach((m,i)=>{if(ps[i]!=null){pts.push([slot*i+slot/2,py(ps[i]),ps[i]]);}});
  if(pts.length>1)s+=`<polyline fill=&quot;none&quot; stroke=&quot;#BA7517&quot; stroke-width=&quot;1.5&quot; points=&quot;${pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}&quot;/>`;
  pts.forEach(p=>{s+=`<circle cx=&quot;${p[0].toFixed(1)}&quot; cy=&quot;${p[1].toFixed(1)}&quot; r=&quot;3&quot; fill=&quot;#BA7517&quot;/><text x=&quot;${p[0].toFixed(1)}&quot; y=&quot;${(p[1]-7).toFixed(1)}&quot; text-anchor=&quot;middle&quot; font-size=&quot;10&quot; fill=&quot;#854F0B&quot;>$${p[2]}</text>`;});
 }
 s+=`</svg>`;
 const legend=`<div class=&quot;chart-legend&quot;><span><i style=&quot;background:#9DBBDD&quot;></i>매입 수량</span>${hasP?'<span><i style=&quot;background:#BA7517&quot;></i>평균 단가</span>':'<span class=&quot;muted&quot; style=&quot;padding:0&quot;>단가 미공시 — 막대만</span>'}</div>`;
 return `<div class=&quot;chart-wrap&quot;><div class=&quot;chart-title&quot;>월별 매입 수량과 평균 단가</div>${s}${legend}</div>`;
}

function qtable(rec){
 if(!rec.rows||!rec.rows.length)return '';
 const body=rec.rows.map(r=>{const isTot=r.lab==='합계'||/total/i.test(r.lab||'');
  return `<tr class=&quot;${isTot?'tot':''}&quot;><td>${periodCell(r)}</td><td>${shares(r.tot)}</td><td class=&quot;${r.avg&amp;&amp;r.avg[0]!=null?'':'dim'}&quot;>${r.avg&amp;&amp;r.avg[0]!=null?'$'+r.avg[0].toLocaleString():'—'}</td><td>${shares(r.pln)}</td><td class=&quot;${r.rem&amp;&amp;r.rem[0]!=null?'':'dim'}&quot;>${usd(r.rem)}</td></tr>`;
 }).join('');
 return `<table class=&quot;qt&quot;><tr><th>기간</th><th>매입 주식수</th><th>평균가</th><th>플랜내 매입</th><th>잔여 한도</th></tr>${body}</table>`;
}

function renderDetail(){

 const recsDesc=[...recs].reverse();
 if(!(SEL in YSEL))YSEL[SEL]=recsDesc[0].fy;
 const cur=SR.find(r=>r.tk===SEL&amp;&amp;r.fy===YSEL[SEL])||recsDesc[0];
 const cds=DSTAT[cur.ds]||DSTAT.not_disclosed;
 const el=document.getElementById('sr-detail');
 let h=`<div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:4px;&quot;>
   <div style=&quot;font-size:20px;font-weight:700;&quot;>${SEL}</div><div style=&quot;font-size:13px;color:var(--tt);&quot;>${CO[SEL]||''}</div>
   <span class=&quot;badge&quot; style=&quot;background:#F1EFE8;color:#5F5E5A;&quot;>10-K</span></div>`;
 h+=`<div class=&quot;ytabs&quot;>`+recsDesc.map(r=>`<button class=&quot;ytab ${r.fy===YSEL[SEL]?'on':''}&quot; data-fy=&quot;${r.fy}&quot;>${fy(r)}</button>`).join('')+`</div>`;
 h+=`<div style=&quot;display:flex;align-items:center;gap:8px;margin-bottom:8px;&quot;><strong style=&quot;font-size:14px;&quot;>${fy(cur)}</strong> ${badge(cds.c,cds.lab)} <span class=&quot;scl&quot;>제출일 ${fmtDate(cur.fd)}</span></div>`;
 if(cur.ds==='disclosed'){
  h+=facts(cur);
  h+=comboChart(cur);
  h+=qtable(cur);
 }else{
  if(cur.ds==='explicitly_none'){h+=`<div class=&quot;empty&quot;><div class=&quot;et&quot;><span class=&quot;echip&quot;>해당 없음</span> 자사주 매입 '없음'을 보고서에 명시</div>${cur.dsq?`<div class=&quot;eq&quot;>&quot;${cur.dsq}&quot;</div>`:''}</div>`;}else{h+=`<div class=&quot;empty&quot;><div class=&quot;et&quot;><span class=&quot;echip&quot;>언급 없음</span> 이 보고서에 관련 내용 없음</div></div>`;}
 }
 h+=`<details class=&quot;acc&quot;><summary>출처</summary><div class=&quot;acc-body&quot;><div class=&quot;src&quot;>출처: ${(cur.sh||[]).join(' · ')||'—'}<br>Accession: ${cur.acc||'—'} · 제출일 ${fmtDate(cur.fd)}</div></div></details>`;
 el.innerHTML=h;
 el.querySelectorAll('.ytab').forEach(b=>b.onclick=()=>{YSEL[SEL]=b.dataset.fy;renderDetail();});
}
renderList();renderDetail();
</script>

<div class=&quot;wrap&quot;>
<header class=&quot;doc&quot;>
 <div class=&quot;eyebrow&quot;>Equity Brief · '인수합병' 모듈 · 기획자·개발자 컨펌용</div>
 <h1>인수합병 (Acquisitions) — 기획·설계 문서 v1</h1>
 <div class=&quot;meta&quot;>와이어프레임 v1 (종목 목록 + 연도 탭 + 인수 카드·상태칩·타임라인) · 중립·No-Derive · kr 기준 · 작성 2026-06-29</div>
</header>

<nav class=&quot;tabs&quot; id=&quot;tabs&quot;>
 <button data-p=&quot;0&quot; class=&quot;on&quot;>1 · 개요·목적</button>
 <button data-p=&quot;1&quot;>2 · 데이터 구조</button>
 <button data-p=&quot;2&quot;>3 · 와이어프레임</button>
 <button data-p=&quot;3&quot;>4 · 요소↔필드 매핑</button>
 <button data-p=&quot;4&quot;>5 · 컨펌·결정</button>
</nav>

<!-- PAGE 1 -->
<section class=&quot;page on&quot; data-page=&quot;0&quot;>
 <h2 class=&quot;sec&quot;>개요 · 목적</h2>
 <p class=&quot;lead&quot;>10-K Item 1/8(사업·재무제표 주석 — 인수) 추출 데이터를 <code>index.html</code> 모듈로 추가한다. 이 화면은 <strong>&quot;이 회사가 어떻게 성장하는가 — 무엇을, 얼마에, 어떤 상태로 인수하나&quot;</strong>를 사실로 보여준다. 자사주 매입이 <em>주주에게 돈을 돌려주는</em> 쪽이라면, 인수는 <em>번 돈을 성장에 재투자하는</em> 쪽 — 둘이 합쳐 자본 배분 그림이 된다.</p>

 <h3 class=&quot;sub&quot;>투자자가 읽을 사실 (중립·균등)</h3>
 <div class=&quot;grid2&quot;>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>규모·건수</div><div class=&quot;v&quot;>이 보고서에 인수 몇 건, 각 인수의 <strong>금액</strong>(원문값, 합산 안 함).</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>인수 상태</div><div class=&quot;v&quot;>완료 / 진행중 / 발표 / <strong>무산</strong> — 칩으로. 같은 인수가 해마다 상태가 바뀜.</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>영역</div><div class=&quot;v&quot;>무엇을(<code>target</code>) 어떤 <strong>부문·유형</strong>으로 사는가.</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>흐름</div><div class=&quot;v&quot;>발표→완료(또는 해지) <strong>타임라인</strong>(events).</div></div>
 </div>

 <h3 class=&quot;sub&quot;>설계 원칙 <span class=&quot;tag none&quot;>자사주 모듈과 동일</span></h3>
 <p>결론(좋다/나쁘다)을 단정하지 않고 사실만 나열한다. 인수가 <strong>없는 것도 중립 사실</strong>(유기적 성장일 수 있음). 금액은 <strong>원문 통화·단위·스케일 그대로</strong>, 성격(현금/영업권/조건부…)이 달라 <strong>합산·환산하지 않는다</strong>. kr 기준(설명·타임라인 한국어, 회사명·금액·인용은 원문).</p>

 <h3 class=&quot;sub&quot;>대상 데이터</h3>
 <p>10개 종목 × 연도별 10-K, 총 <strong>37건</strong>. 공시 분포: <strong>구체 공시 31 · 일반 언급만 4 · 없음 2</strong>. 종목별 전략이 뚜렷(LLY 연 10~13건 바이오 볼트온 / BRK-B 복합기업 롤업 / 빅테크 초대형 인수 / AAPL 일반 언급만 / TSLA 거의 없음).</p>
</section>

<!-- PAGE 2 -->
<section class=&quot;page&quot; data-page=&quot;1&quot;>
 <h2 class=&quot;sec&quot;>데이터 구조 (v5 스키마)</h2>
 <table>
  <tr><th>필드</th><th>내용</th><th>허용값 / 비고</th></tr>
  <tr><td><code>disclosure_status.value</code></td><td>인수를 구체 공시했나</td><td><code>specific_acquisitions_disclosed</code> · <code>general_only</code> · <code>none_disclosed</code></td></tr>
  <tr><td><code>acquisitions[]</code></td><td>개별 인수 배열</td><td>null/[] = 구체 인수 없음</td></tr>
  <tr><td>└ <code>target_name</code> / <code>description</code></td><td>피인수사 · 1~2줄 설명(kr)</td><td>string</td></tr>
  <tr><td>└ <code>acquisition_type</code></td><td>인수 유형</td><td>business_combination · asset_acquisition · other · unknown</td></tr>
  <tr><td>└ <code>status</code></td><td>인수 상태</td><td>completed · pending · announced · terminated</td></tr>
  <tr><td>└ <code>segment</code> / <code>ownership_stake</code></td><td>귀속 부문 / 취득 지분</td><td>일부 null</td></tr>
  <tr><td>└ <code>events[]</code></td><td>타임라인</td><td>{event_date, description(kr)}</td></tr>
  <tr><td>└ <code>amounts[]</code></td><td>금액 배열</td><td>{type, value, unit:USD, scale}</td></tr>
  <tr><td>└ <code>evidence</code></td><td>원문 인용 + 근거</td><td>quote(verbatim) · reasoning(kr)</td></tr>
 </table>

 <h3 class=&quot;sub&quot;>금액 type 9종 (원문 그대로)</h3>
 <table>
  <tr><th>type</th><th>뜻</th><th>예 (원문값)</th></tr>
  <tr><td>cash_consideration</td><td>현금 대가</td><td>AMZN·MGM $6.1B</td></tr>
  <tr><td>purchase_price</td><td>인수가</td><td>AMZN·One Medical $3.9B</td></tr>
  <tr><td>total_consideration</td><td>총 인수대가</td><td>AVGO·VMware $86,290M</td></tr>
  <tr><td>goodwill</td><td>영업권(프리미엄)</td><td>AMZN·MGM $4.9B</td></tr>
  <tr><td>earn_out_or_contingent</td><td>조건부 대가</td><td>LLY·Akouos $122M</td></tr>
  <tr><td>deferred_or_holdback</td><td>이연·유보 지급</td><td>NVDA·Groq $4B</td></tr>
  <tr><td>ipr_and_d_expensed</td><td>진행중 R&amp;D 비용처리</td><td>LLY·Petra $333.8M</td></tr>
  <tr><td>termination_payment</td><td>해지 비용</td><td>NVDA·Arm $1.35B</td></tr>
  <tr><td>other</td><td>기타(예: 인수부채)</td><td>AMZN·MGM $2.5B</td></tr>
 </table>

 <div class=&quot;warnbox&quot;><div class=&quot;q&quot;>⚠ 표시하지 않는 것</div><div class=&quot;o&quot;>금액 <strong>합산·환산 금지</strong>(현금·영업권·조건부 등 성격이 달라 더하지 않음). 회사·연도 단위 &quot;총 인수액&quot;을 만들지 않음. &quot;좋은/나쁜 인수&quot; 단정 없음.</div></div>

 <h3 class=&quot;sub&quot;>빈 상태</h3>
 <ul class=&quot;clean&quot;>
  <li><strong>general_only</strong> (AAPL 등) → &quot;일부만 언급 (구체 내용 없음)&quot; + 원문 근거</li>
  <li><strong>none_disclosed</strong> (TSLA) → &quot;언급 없음 (이 보고서에 관련 내용 없음)&quot;</li>

<script>

function goPage(n){P=Math.max(0,Math.min(pages.length-1,n));
 pages.forEach((pg,i)=>pg.classList.toggle('on',i===P));
 navbtns.forEach((b,i)=>b.classList.toggle('on',i===P));
 document.getElementById('ind').textContent=(P+1)+' / '+pages.length;

 window.scrollTo({top:0,behavior:'smooth'});}
tabsEl.addEventListener('click',e=>{const b=e.target.closest('button');if(b)goPage(+b.dataset.p);});
document.getElementById('prev').onclick=()=>goPage(P-1);
document.getElementById('next').onclick=()=>goPage(P+1);
goPage(0);
</script>

 const any=(a.am||[]).find(x=>x[1]!=null);return any?money(any):null;
}
function renderList(){
 const el=document.getElementById('sr-list');
 el.innerHTML=ORDER.map(tk=>{const rec=latest(tk);const ds=DSTAT[rec.ds]||DSTAT.none_disclosed;
  return `<div class=&quot;sr-row ${tk===SEL?'on':''}&quot; data-tk=&quot;${tk}&quot;><div class=&quot;tk&quot;>${tk}</div><div class=&quot;co&quot;>${CO[tk]||''}</div>${badge(ds.c,ds.lab)}<div class=&quot;sig&quot;>${listSignal(rec)} <span class=&quot;scl&quot;>· ${fy(rec)}</span></div></div>`;
 }).join('');
 el.querySelectorAll('.sr-row').forEach(r=>r.onclick=()=>{SEL=r.dataset.tk;delete YSEL[SEL];renderList();renderDetail();});
}

function dealCard(a){
 const ty=TYPE[a.ty]||a.ty||'';
 const st=STAT[a.st]||{lab:a.st,c:'gray'};
 let amts=(a.am||[]).map(m=>{const v=money(m);return `<span class=&quot;am ${v?'':'dim'}&quot;><b>${AMT[m[0]]||m[0]}</b> ${v||'미공시'}</span>`;}).join('');
 if(!amts)amts='<span class=&quot;am dim&quot;>금액 미공시</span>';
 let tl='';
 if(a.ev&amp;&amp;a.ev.length)tl=`<div class=&quot;tl&quot;>${a.ev.map(e=>`<div class=&quot;ev&quot;><span class=&quot;d&quot;>${e[0]||'—'}</span>${e[1]||''}</div>`).join('')}</div>`;
 return `<div class=&quot;dcard&quot;>
  <div class=&quot;dcard-h&quot;><span class=&quot;nm&quot;>${a.n||'(이름 미상)'}</span> ${ty?`<span class=&quot;chip chip-out&quot;>${ty}</span>`:''} ${chip(st.c,st.lab)}</div>
  ${a.sg?`<div class=&quot;dseg&quot;>부문: ${a.sg}${a.os?' · 지분: '+a.os:''}</div>`:(a.os?`<div class=&quot;dseg&quot;>지분: ${a.os}</div>`:'')}
  <div class=&quot;amts&quot;>${amts}</div>
  ${a.d?`<div class=&quot;ddesc&quot;>${a.d}</div>`:''}
  ${tl}
 </div>`;
}

function acqTrend(recs){
 const pts=[...recs].reverse().map(r=>({y:r.fy.slice(0,4),v:(r.ds==='specific_acquisitions_disclosed'?(r.A||[]).length:0)}));
 if(pts.every(p=>p.v===0))return '';
 const max=Math.max(1,...pts.map(p=>p.v));
 const bars=pts.map(p=>{const w=p.v?Math.max(2,Math.round(p.v/max*100)):0;return `<div class=&quot;tbar-row&quot;><div class=&quot;tbar-y&quot;>${p.y}</div><div class=&quot;tbar-wrap&quot;><div class=&quot;tbar ${p.v?'':'zero'}&quot; style=&quot;width:${w}%&quot;></div></div><div class=&quot;tbar-v&quot;>${p.v}건</div></div>`;}).join('');
 return `<div class=&quot;trendbox&quot;><div class=&quot;trendt&quot;>연도별 인수 건수</div>${bars}</div>`;
}
function renderDetail(){
 const recs=ACQ.filter(r=>r.tk===SEL).sort((a,b)=>a.fy.localeCompare(b.fy));
 const recsDesc=[...recs].reverse();
 if(!(SEL in YSEL))YSEL[SEL]=recsDesc[0].fy;
 const cur=ACQ.find(r=>r.tk===SEL&amp;&amp;r.fy===YSEL[SEL])||recsDesc[0];
 const cds=DSTAT[cur.ds]||DSTAT.none_disclosed;
 const el=document.getElementById('sr-detail');
 let h=`<div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:4px;&quot;>
   <div style=&quot;font-size:20px;font-weight:700;&quot;>${SEL}</div><div style=&quot;font-size:13px;color:var(--tt);&quot;>${CO[SEL]||''}</div>
   <span class=&quot;badge&quot; style=&quot;background:#F1EFE8;color:#5F5E5A;&quot;>10-K</span></div>`;
 h+=acqTrend(recs);
 h+=`<div class=&quot;ytabs&quot;>`+recsDesc.map(r=>`<button class=&quot;ytab ${r.fy===YSEL[SEL]?'on':''}&quot; data-fy=&quot;${r.fy}&quot;>${fy(r)}</button>`).join('')+`</div>`;
 h+=`<div style=&quot;display:flex;align-items:center;gap:8px;margin-bottom:4px;&quot;><strong style=&quot;font-size:14px;&quot;>${fy(cur)}</strong> ${badge(cds.c,cds.lab)} <span class=&quot;scl&quot;>제출일 ${cur.fd||'—'}</span></div>`;
 if(cur.ds==='specific_acquisitions_disclosed'&amp;&amp;(cur.A||[]).length){
  const c=statusCounts(cur.A);
  const parts=[];['completed','pending','announced','terminated'].forEach(k=>{if(c[k])parts.push(`${STAT[k].lab} ${c[k]}`);});
  h+=`<div class=&quot;sumline&quot;>인수 <b>${cur.A.length}건</b>${parts.length?' · '+parts.join(' / '):''}</div>`;
  h+=`<div class=&quot;sortbar&quot;><span class=&quot;sortlab&quot;>정렬</span><button class=&quot;sortbtn ${ACQSORT==='date'?'on':''}&quot; data-s=&quot;date&quot;>최신순</button><button class=&quot;sortbtn ${ACQSORT==='amount'?'on':''}&quot; data-s=&quot;amount&quot;>금액순</button></div>`;
  const sorted=[...cur.A].sort(ACQSORT==='date'?(x,y)=>acqDate(y).localeCompare(acqDate(x)):(x,y)=>sortKey(y)-sortKey(x));
  h+=sorted.map(dealCard).join('');
 }else{
  if(cur.ds==='general_only'){h+=`<div class=&quot;empty&quot;><div class=&quot;et&quot;><span class=&quot;echip&quot;>일부 언급</span> 구체 내용 없이 일부만 언급</div>${cur.dsq?`<div class=&quot;eq&quot;>&quot;${cur.dsq}&quot;</div>`:''}</div>`;}else{h+=`<div class=&quot;empty&quot;><div class=&quot;et&quot;><span class=&quot;echip&quot;>언급 없음</span> 이 보고서에 관련 내용 없음</div></div>`;}
 }
 h+=`<details class=&quot;acc&quot;><summary>출처</summary><div class=&quot;acc-body&quot;><div class=&quot;src&quot;>출처: ${(cur.sh||[]).join(' · ')||'—'}<br>Accession: ${cur.acc||'—'} · 제출일 ${cur.fd||'—'}</div></div></details>`;
 el.innerHTML=h;
 el.querySelectorAll('.ytab').forEach(b=>b.onclick=()=>{YSEL[SEL]=b.dataset.fy;renderDetail();});
 el.querySelectorAll('.sortbtn').forEach(b=>b.onclick=()=>{ACQSORT=b.dataset.s;renderDetail();});
}
renderList();renderDetail();
</script>

<body>
<div class=&quot;wrap&quot;>
<header class=&quot;doc&quot;>
 <div class=&quot;eyebrow&quot;>Equity Brief · '부채' 모듈 · 기획자·개발자 컨펌용</div>
 <h1>부채 (Debt Instruments) — 기획·설계 문서 v1</h1>
 <div class=&quot;meta&quot;>와이어프레임 v1 (종목 목록 + 연도 탭 + 공시 합계 + category별 부채 상품) · 중립·No-Derive · kr 기준 · 작성 2026-06-29</div>
</header>

<nav class=&quot;tabs&quot; id=&quot;tabs&quot;>
 <button data-p=&quot;0&quot; class=&quot;on&quot;>1 · 개요·목적</button>
 <button data-p=&quot;1&quot;>2 · 데이터 구조·용어</button>
 <button data-p=&quot;2&quot;>3 · 와이어프레임</button>
 <button data-p=&quot;3&quot;>4 · 요소↔필드 매핑</button>
 <button data-p=&quot;4&quot;>5 · 컨펌·결정</button>
</nav>

<!-- PAGE 1 -->
<section class=&quot;page on&quot; data-page=&quot;0&quot;>
 <h2 class=&quot;sec&quot;>개요 · 목적</h2>
 <p class=&quot;lead&quot;>10-K Item 8(재무제표 주석 — Debt) 추출 데이터를 <code>index.html</code> 모듈로 추가한다. 이 화면은 <strong>&quot;이 회사가 빚을 얼마나, 어떤 조건으로 지고 있나 — 규모·금리·만기·담보&quot;</strong>를 사실로 보여준다. 자사주(주주환원)·인수(성장투자)와 함께 보면 <em>자본을 어디서 조달하나</em>가 완성된다.</p>

 <h3 class=&quot;sub&quot;>투자자가 읽을 사실 (중립)</h3>
 <div class=&quot;grid2&quot;>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>규모</div><div class=&quot;v&quot;>총 부채(회사가 <strong>공시한 합계</strong>, 장기/단기). 상품 임의 합산은 안 함.</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>금리 구조</div><div class=&quot;v&quot;><strong>고정 vs 변동</strong> + 개별 금리 — 금리 위험을 투자자가 판단.</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>만기</div><div class=&quot;v&quot;>언제 갚아야 하나(<code>maturity_date</code>) · 단기/장기 분류.</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>담보·통화</div><div class=&quot;v&quot;>무담보/담보(신용 신호), 통화(USD·일부 JPY).</div></div>
 </div>

 <h3 class=&quot;sub&quot;>설계 원칙 <span class=&quot;tag none&quot;>자사주·인수 모듈과 동일</span></h3>
 <p>결론(좋다/나쁘다)을 단정하지 않고 사실만 나열. <strong>상품 원금을 임의로 합산하지 않고</strong>, 회사가 직접 공시한 <code>totals</code>만 합계로 표시. 통화 환산·&quot;평균 금리&quot; 같은 파생은 만들지 않는다. kr 기준(설명 한국어, 상품명·금액·금리는 원문). 카드/표엔 <strong>출처만</strong>(원문 인용 제외).</p>

 <h3 class=&quot;sub&quot;>대상 데이터</h3>
 <p>10개 종목 × 연도별 10-K, 총 <strong>37건</strong>. 거의 전부 공시(<strong>disclosed 36 · 공시 미확인 1</strong>=TSLA 2025). 상품 수 편차 큼(AVGO 53·LLY 47 ↔ AAPL 2~3). 대부분 <strong>무담보·고정금리·장기 선순위 채권</strong>.</p>
</section>

<!-- PAGE 2 -->
<section class=&quot;page&quot; data-page=&quot;1&quot;>
 <h2 class=&quot;sec&quot;>데이터 구조 (v5 스키마)</h2>
 <table>
  <tr><th>필드</th><th>내용</th><th>비고</th></tr>
  <tr><td><code>disclosure_status.value</code></td><td>부채 공시 여부</td><td><code>disclosed</code> · <code>not_disclosed</code></td></tr>
  <tr><td><code>instruments[]</code></td><td>개별 부채 상품</td><td>미공시 시 빈 배열</td></tr>
  <tr><td>└ <code>name</code> / <code>category</code></td><td>상품명 / 유형</td><td>아래 용어표</td></tr>

<script>
const tabsEl=document.getElementById('tabs');
const pages=[...document.querySelectorAll('.page')];
const navbtns=[...tabsEl.querySelectorAll('button')];
let P=0;
function goPage(n){P=Math.max(0,Math.min(pages.length-1,n));
 pages.forEach((pg,i)=>pg.classList.toggle('on',i===P));
 navbtns.forEach((b,i)=>b.classList.toggle('on',i===P));
 document.getElementById('ind').textContent=(P+1)+' / '+pages.length;
 document.getElementById('prev').disabled=P===0;document.getElementById('next').disabled=P===pages.length-1;
 window.scrollTo({top:0,behavior:'smooth'});}
tabsEl.addEventListener('click',e=>{const b=e.target.closest('button');if(b)goPage(+b.dataset.p);});
document.getElementById('prev').onclick=()=>goPage(P-1);
document.getElementById('next').onclick=()=>goPage(P+1);
goPage(0);
</script>

  return `<div class=&quot;sr-row ${tk===SEL?'on':''}&quot; data-tk=&quot;${tk}&quot;><div class=&quot;tk&quot;>${tk}</div><div class=&quot;co&quot;>${CO[tk]||''}</div>${badge(ds.c,ds.lab)}<div class=&quot;sig&quot;>${listSignal(rec)} <span class=&quot;scl&quot;>· ${fy(rec)}</span></div></div>`;
 }).join('');
 el.querySelectorAll('.sr-row').forEach(r=>r.onclick=()=>{SEL=r.dataset.tk;delete YSEL[SEL];renderList();renderDetail();});
}

function summary(rec){
 const I=rec.I||[];const fx=I.filter(x=>x.rt==='fixed').length,va=I.filter(x=>x.rt==='variable').length;
 const us=I.filter(x=>x.sc==='unsecured').length,se=I.filter(x=>x.sc==='secured').length;
 let jpy=false;I.forEach(it=>(it.pp||[]).forEach(p=>{if(p[2]==='JPY')jpy=true;}));
 const parts=[`부채상품 <b>${I.length}개</b>`];
 if(fx||va)parts.push(`고정 ${fx} / 변동 ${va}`);
 if(us||se)parts.push(`무담보 ${us} / 담보 ${se}`);
 if(jpy)parts.push('통화 USD·JPY');
 return `<div class=&quot;sumline&quot;>${parts.join(' · ')}</div>`;
}
function totalsTable(rec){
 const T=rec.T||[];if(!T.length)return '';
 let h=`<div class=&quot;cathd2&quot;>공시 합계 (원문)</div><table class=&quot;dt&quot;><tr><th>항목</th><th>분류</th><th>최근</th><th>전년</th></tr>`;
 T.forEach(t=>{const cp=curPrior(t.ap);h+=`<tr class=&quot;totrow&quot;><td>${t.l||'—'}</td><td>${t.cl||'—'}</td><td>${money(cp.cur)}</td><td>${cp.prior?money(cp.prior):'—'}</td></tr>`;});
 return h+`</table>`;
}
function instrTables(rec){
 const I=rec.I||[];if(!I.length)return '';
 const byc={};I.forEach(it=>{(byc[it.c]=byc[it.c]||[]).push(it);});
 const cats=CATORDER.filter(c=>byc[c]).concat(Object.keys(byc).filter(c=>!CATORDER.includes(c)));
 let html='<div class=&quot;cathd2&quot;>부채 상품</div>';
 cats.forEach(c=>{const arr=byc[c];
  html+=`<div class=&quot;catgrp&quot;><div class=&quot;cathd&quot;>${CAT[c]||c}<span class=&quot;catn&quot;>${arr.length}</span></div>`;
  html+=`<table class=&quot;dt&quot;><tr><th>상품</th><th>분류</th><th>담보</th><th>금리</th><th>만기</th><th>원금(당기)</th></tr>`;
  arr.forEach(it=>{const cp=curPrior(it.pp);
   html+=`<tr><td>${it.n||'—'}</td><td>${clsChip(it.cl)}</td><td>${secChip(it.sc)}</td><td>${rate(it)}</td><td>${matY(it.md)}</td><td>${money(cp.cur)}${cp.prior&amp;&amp;cp.prior[1]!=null?`<span class=&quot;scl&quot;> (전년 ${money(cp.prior)})</span>`:''}</td></tr>`;});
  html+=`</table></div>`;
 });
 return html;
}
function debtTrend(recs){
 const pts=[...recs].reverse().map(r=>{const t=(r.T||[]).find(x=>x.cl==='total');let cur=null;if(t){const cp=curPrior(t.ap);if(cp.cur&amp;&amp;cp.cur[1]!=null)cur=cp.cur;}return {y:r.fy.slice(0,4),cur:cur};});
 if(pts.every(p=>!p.cur))return '';
 const max=Math.max(1,...pts.map(p=>p.cur?p.cur[1]:0));
 const bars=pts.map(p=>{const w=p.cur?Math.max(2,Math.round(p.cur[1]/max*100)):0;const lab=p.cur?money(p.cur):'미공시';return `<div class=&quot;tbar-row&quot;><div class=&quot;tbar-y&quot;>${p.y}</div><div class=&quot;tbar-wrap&quot;><div class=&quot;tbar ${p.cur?'':'zero'}&quot; style=&quot;width:${w}%&quot;></div></div><div class=&quot;tbar-v&quot;>${lab}</div></div>`;}).join('');
 return `<div class=&quot;trendbox&quot;><div class=&quot;trendt&quot;>연도별 총 부채 <span class=&quot;scl&quot;>· 공시 '총 부채(total)' 기준</span></div>${bars}</div>`;
}
function renderDetail(){
 const recs=DEBT.filter(r=>r.tk===SEL).sort((a,b)=>a.fy.localeCompare(b.fy));
 const recsDesc=[...recs].reverse();
 if(!(SEL in YSEL))YSEL[SEL]=recsDesc[0].fy;
 const cur=DEBT.find(r=>r.tk===SEL&amp;&amp;r.fy===YSEL[SEL])||recsDesc[0];
 const cds=DSTAT[cur.ds]||DSTAT.not_disclosed;
 const el=document.getElementById('sr-detail');
 let h=`<div style=&quot;display:flex;align-items:center;gap:10px;margin-bottom:4px;&quot;>
   <div style=&quot;font-size:20px;font-weight:700;&quot;>${SEL}</div><div style=&quot;font-size:13px;color:var(--tt);&quot;>${CO[SEL]||''}</div>
   <span class=&quot;badge&quot; style=&quot;background:#F1EFE8;color:#5F5E5A;&quot;>10-K</span></div>`;
 h+=debtTrend(recs);
 h+=`<div class=&quot;ytabs&quot;>`+recsDesc.map(r=>`<button class=&quot;ytab ${r.fy===YSEL[SEL]?'on':''}&quot; data-fy=&quot;${r.fy}&quot;>${fy(r)}</button>`).join('')+`</div>`;
 h+=`<div style=&quot;display:flex;align-items:center;gap:8px;margin-bottom:4px;&quot;><strong style=&quot;font-size:14px;&quot;>${fy(cur)}</strong> ${badge(cds.c,cds.lab)} <span class=&quot;scl&quot;>제출일 ${cur.fd||'—'}</span></div>`;
 if(cur.ds==='disclosed'&amp;&amp;(cur.I||[]).length){
  h+=totalsTable(cur);
  h+=instrTables(cur);
 }else{
  h+=`<div class=&quot;empty&quot;><div class=&quot;et&quot;><span class=&quot;echip&quot;>언급 없음</span> 이 보고서에 관련 내용 없음</div></div>`;
 }
 h+=`<details class=&quot;acc&quot;><summary>출처</summary><div class=&quot;acc-body&quot;><div class=&quot;src&quot;>출처: ${(cur.sh||[]).join(' · ')||'—'}<br>Accession: ${cur.acc||'—'} · 제출일 ${cur.fd||'—'}</div></div></details>`;
 el.innerHTML=h;
 el.querySelectorAll('.ytab').forEach(b=>b.onclick=()=>{YSEL[SEL]=b.dataset.fy;renderDetail();});
}
renderList();renderDetail();
</script>

 <h1>부동산·시설 (Physical Properties) — 기획·설계 문서 v1</h1>
 <div class=&quot;meta&quot;>와이어프레임 v1 (종목 목록 + 연도 탭 + 포트폴리오 요약 + 시설 카드) · 중립·No-Derive · kr 기준 · 작성 2026-06-29</div>

<!-- PAGE 1 -->
<section class=&quot;page on&quot; data-page=&quot;0&quot;>
 <h2 class=&quot;sec&quot;>개요 · 목적</h2>
 <p class=&quot;lead&quot;>10-K Item 2(Properties) 추출 데이터를 <code>index.html</code> 모듈로 추가한다. 이 화면은 <strong>&quot;이 회사가 어디서, 어떤 시설로, 자기 것으로/빌려서 운영하나 — 물리적 운영 기반&quot;</strong>을 사실로 보여준다. 자사주·인수·부채(자본의 흐름)와 달리, 이건 회사의 <em>실물 기반</em>이다.</p>

 <h3 class=&quot;sub&quot;>투자자가 읽을 사실 (중립)</h3>
 <div class=&quot;grid2&quot;>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>어디서</div><div class=&quot;v&quot;>본사 위치 · 시설 지역(<code>location</code>).</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>무슨 시설</div><div class=&quot;v&quot;>본사·오피스·<strong>데이터센터·제조·리테일</strong> 등 유형(<code>property_type</code>).</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>보유 vs 임차</div><div class=&quot;v&quot;><strong>시설을 직접 보유하나, 빌려서 쓰나</strong>(<code>ownership</code>: 보유/임차/혼합).</div></div>
  <div class=&quot;kv&quot;><div class=&quot;k&quot;>규모</div><div class=&quot;v&quot;>면적(<code>area</code>, 공시된 경우) · 본사 보유/임차 수.</div></div>
 </div>

 <h3 class=&quot;sub&quot;>설계 원칙 <span class=&quot;tag none&quot;>앞 모듈과 동일</span></h3>
 <p>결론(좋다/나쁘다) 단정 없이 사실만. 면적·수치가 없으면 만들지 않고 <strong>&quot;미공시&quot;</strong>. 합산·환산 없음. kr 기준(설명 한국어, 지명·면적은 원문). 출처만(원문 인용 제외).</p>

 <h3 class=&quot;sub&quot;>대상 데이터</h3>
 <p>10개 종목 × 연도별 10-K, 총 <strong>37건</strong>. 거의 전부 공시(<strong>specific 36 · 없음 1</strong>=TSLA 2025). <strong>요약 중심·서술적</strong> 데이터(시설을 카테고리로 묶어 2~8개로 서술, BRK-B만 16~29개). 시설 성격이 회사를 가름: 제조 중심(TSLA·LLY·AVGO) / 데이터센터 중심(MSFT·GOOGL·META) / 임차·외주 중심(AAPL).</p>
</section>

<!-- PAGE 2 -->
<section class=&quot;page&quot; data-page=&quot;1&quot;>
 <h2 class=&quot;sec&quot;>데이터 구조 (v5 스키마)</h2>
 <table>
  <tr><th>필드</th><th>내용</th><th>비고</th></tr>
  <tr><td><code>disclosure_status.value</code></td><td>부동산 공시 여부</td><td><code>specific_properties_disclosed</code> · <code>none_disclosed</code></td></tr>
  <tr><td><code>portfolio_summary</code></td><td>전체 요약</td><td>headquarters · owned/leased_count · total_area · business_model_note (대부분 일부 null)</td></tr>
  <tr><td><code>properties[]</code></td><td>개별 시설</td><td>보통 2~8개</td></tr>
  <tr><td>└ <code>label</code> / <code>property_type</code></td><td>명칭 / 유형</td><td>아래 용어표</td></tr>
  <tr><td>└ <code>location</code></td><td>위치</td><td>{description, city, state_or_region, country}</td></tr>
  <tr><td>└ <code>ownership</code></td><td>소유 형태</td><td>owned · leased · mixed · unknown</td></tr>

<script>
const tabsEl=document.getElementById('tabs');
const pages=[...document.querySelectorAll('.page')];
const navbtns=[...tabsEl.querySelectorAll('button')];
let P=0;
function goPage(n){P=Math.max(0,Math.min(pages.length-1,n));
 pages.forEach((pg,i)=>pg.classList.toggle('on',i===P));
 navbtns.forEach((b,i)=>b.classList.toggle('on',i===P));
 document.getElementById('ind').textContent=(P+1)+' / '+pages.length;
 document.getElementById('prev').disabled=P===0;document.getElementById('next').disabled=P===pages.length-1;
 window.scrollTo({top:0,behavior:'smooth'});}
tabsEl.addEventListener('click',e=>{const b=e.target.closest('button');if(b)goPage(+b.dataset.p);});
document.getElementById('prev').onclick=()=>goPage(P-1);
document.getElementById('next').onclick=()=>goPage(P+1);
goPage(0);
</script>

function badge(c,t){const r=BADGE[c]||BADGE.gray;return `<span class=&quot;badge&quot; style=&quot;background:${r.bg};color:${r.fg}&quot;>${t}</span>`;}

function fmtLoc(loc){if(!loc)return null;const[desc,city,state,country]=loc;if(city&amp;&amp;state)return city+', '+state;return desc||state||country||null;}
function latest(tk){return PROP.filter(r=>r.tk===tk).sort((a,b)=>b.fy.localeCompare(a.fy))[0];}

function pastPROP(rec){const o=PROP.filter(x=>x.tk===rec.tk&amp;&amp;x.fy!==rec.fy);return o.some(x=>x.ds==='specific_properties_disclosed')?' · 과거 연도 자료 있음':'';}

function renderList(){

function summaryBlock(rec){
 const s=rec.sum||{};

function propCard(p){
 const ty=PTYPE[p.ty]||p.ty||'';
 const ow=OWN[p.ow]||{lab:p.ow||'미상',c:'gray'};
 const meta=[];const loc=fmtLoc(p.loc);const ar=area(p.ar);

}
function renderDetail(){
 const recs=PROP.filter(r=>r.tk===SEL).sort((a,b)=>a.fy.localeCompare(b.fy));

 if(!(SEL in YSEL))YSEL[SEL]=recsDesc[0].fy;

  h+=`<div class=&quot;empty&quot;><div class=&quot;et&quot;><span class=&quot;echip&quot;>언급 없음</span> 이 보고서에 관련 내용 없음</div></div>`;
 }
 h+=`<details class=&quot;acc&quot;><summary>출처</summary><div class=&quot;acc-body&quot;><div class=&quot;src&quot;>출처: ${(cur.sh||[]).join(' · ')||'—'}<br>Accession: ${cur.acc||'—'} · 제출일 ${cur.fd||'—'}</div></div></details>`;
 el.innerHTML=h;
 el.querySelectorAll('.ytab').forEach(b=>b.onclick=()=>{YSEL[SEL]=b.dataset.fy;renderDetail();});
}

</script>
